workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 60
    environment:
      node: 22
      java: 21
      vars:
        COREPACK_ENABLE_STRICT: "0"
    scripts:
      - name: Setup pnpm
        script: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm --version

      - name: Install dependencies
        script: pnpm install --no-frozen-lockfile

      - name: Setup Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > artifacts/italiano/android/local.properties

      - name: Create webDir for Capacitor
        script: |
          mkdir -p artifacts/italiano/dist/public
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Loading...</title></head><body></body></html>' > artifacts/italiano/dist/public/index.html

      - name: Sync Capacitor
        script: |
          cd artifacts/italiano
          npx cap sync android

      - name: Fix AdMob missing libs directory
        script: |
          find node_modules -path "*/capacitor-community/admob/android" -type d 2>/dev/null | while read dir; do
            echo "Creating libs dir in: $dir"
            mkdir -p "$dir/libs"
          done

      - name: Build Android APK
        script: |
          set -o pipefail
          cd artifacts/italiano/android
          chmod +x gradlew
          ./gradlew assembleDebug --info 2>&1 | tee /tmp/gradle_output.log
          echo ""
          echo "=== PWD: $(pwd) ==="
          echo "=== CM_BUILD_DIR: ${CM_BUILD_DIR:-not set} ==="
          echo ""
          echo "=== Build outputs directory ==="
          find app/build/outputs -type f 2>/dev/null || echo "No app/build/outputs found"
          echo ""
          echo "=== APK files under /Users/builder ==="
          find /Users/builder -name "*.apk" -type f 2>/dev/null || echo "No APKs under /Users/builder"

      - name: Collect APK artifact
        script: |
          set -e
          EXPECTED_PATH="${CM_BUILD_DIR:-/Users/builder/clone}/artifacts/italiano/android/app/build/outputs/apk/debug/app-debug.apk"
          echo "Looking for APK at: $EXPECTED_PATH"
          if [ -f "$EXPECTED_PATH" ]; then
            APK_SRC="$EXPECTED_PATH"
          else
            echo "Not at expected path. Searching under /Users/builder..."
            APK_SRC=$(find /Users/builder -path "*/outputs/apk/debug/app-debug.apk" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$APK_SRC" ]; then
            echo "Broadening search for any app-debug.apk under /Users/builder..."
            APK_SRC=$(find /Users/builder -name "app-debug.apk" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$APK_SRC" ]; then
            echo "ERROR: No APK found under /Users/builder!"
            echo "Last 50 lines of Gradle log:"
            tail -50 /tmp/gradle_output.log
            exit 1
          fi
          echo "Found APK at: $APK_SRC"
          mkdir -p apk_output
          cp "$APK_SRC" apk_output/app-debug.apk
          echo "APK copied to apk_output/app-debug.apk:"
          ls -la apk_output/app-debug.apk

    artifacts:
      - apk_output/app-debug.apk

    publishing:
      email:
        recipients:
          - ahmedfreedom2019@gmail.com
        notify:
          success: true
          failure: true
