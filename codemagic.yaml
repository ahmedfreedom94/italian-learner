workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 60
    environment:
      node: 20.0.0
      java: 17
    scripts:
      - name: Install pnpm
        script: npm install -g pnpm

      - name: Install dependencies
        script: pnpm install

      - name: Build web app
        script: |
          cd artifacts/italiano
          BASE_PATH="/" PORT=3000 NODE_ENV=production pnpm run build

      - name: Sync Capacitor
        script: |
          cd artifacts/italiano
          npx cap sync android

      - name: Build Android APK
        script: |
          cd artifacts/italiano/android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - artifacts/italiano/android/app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - your-email@gmail.com
        notify:
          success: true
          failure: true
