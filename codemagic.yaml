workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 60
    environment:
      node: 22
      java: 17
      vars:
        COREPACK_ENABLE_STRICT: "0"
    scripts:
      - name: Setup pnpm
        script: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm --version

      - name: Install dependencies
        script: pnpm install --no-frozen-lockfile

      - name: Setup Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > artifacts/italiano/android/local.properties

      - name: Sync Capacitor
        script: |
          cd artifacts/italiano
          npx cap sync android

      - name: Build Android APK
        script: |
          cd artifacts/italiano/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: List generated APKs
        script: |
          echo "=== All APK files ==="
          find artifacts/italiano/android -name "*.apk" -type f
          echo "=== Done ==="

    artifacts:
      - artifacts/italiano/android/app/build/outputs/**/*.apk
      - artifacts/italiano/android/app/build/**/*.apk

    publishing:
      email:
        recipients:
          - ahmedfreedom2019@gmail.com
        notify:
          success: true
          failure: true
