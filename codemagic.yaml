workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 60
    environment:
      node: 22
      java: 21
      vars:
        COREPACK_ENABLE_STRICT: "0"
    scripts:
      - name: Setup pnpm
        script: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm --version

      - name: Install dependencies
        script: pnpm install --no-frozen-lockfile

      - name: Setup Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > artifacts/italiano/android/local.properties

      - name: Create webDir for Capacitor
        script: |
          mkdir -p artifacts/italiano/dist/public
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Loading...</title></head><body></body></html>' > artifacts/italiano/dist/public/index.html

      - name: Sync Capacitor
        script: |
          cd artifacts/italiano
          npx cap sync android

      - name: Fix Gradle Build Files
        script: |
          echo "=== Removing AdMob from Gradle ==="
          sed -i '' '/capacitor-community-admob/d' artifacts/italiano/android/capacitor.settings.gradle
          sed -i '' '/capacitor-community-admob/d' artifacts/italiano/android/app/capacitor.build.gradle
          echo "=== Rewriting capacitor-cordova-android-plugins/build.gradle ==="
          cat > artifacts/italiano/android/capacitor-cordova-android-plugins/build.gradle << 'GRADLE_EOF'
          ext {
              androidxAppCompatVersion = '1.7.0'
              cordovaAndroidVersion = '14.0.1'
              cdvPluginPostBuildExtras = []
              cordovaConfig = [:]
          }

          apply plugin: 'com.android.library'

          android {
              namespace = "capacitor.cordova.android.plugins"
              compileSdk = 35
              defaultConfig {
                  minSdkVersion 24
                  targetSdkVersion 35
                  versionCode 1
                  versionName "1.0"
              }
              lintOptions {
                  abortOnError = false
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_21
                  targetCompatibility JavaVersion.VERSION_21
              }
          }

          repositories {
              google()
              mavenCentral()
              flatDir {
                  dirs 'src/main/libs', 'libs'
              }
          }

          dependencies {
              implementation fileTree(dir: 'src/main/libs', include: ['*.jar'])
              implementation "androidx.appcompat:appcompat:1.7.0"
              implementation "org.apache.cordova:framework:14.0.1"
          }

          for (def func : cdvPluginPostBuildExtras) {
              func()
          }
          GRADLE_EOF
          echo "=== Verifying all patched files ==="
          echo "--- capacitor.settings.gradle ---"
          cat artifacts/italiano/android/capacitor.settings.gradle
          echo ""
          echo "--- capacitor.build.gradle ---"
          cat artifacts/italiano/android/app/capacitor.build.gradle
          echo ""
          echo "--- capacitor-cordova-android-plugins/build.gradle ---"
          cat artifacts/italiano/android/capacitor-cordova-android-plugins/build.gradle

      - name: Ensure Android SDK 35
        script: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>/dev/null || true

      - name: Build Android APK
        script: |
          ROOT_DIR=$(pwd)
          cd artifacts/italiano/android
          chmod +x gradlew
          sed -i '' 's/gradle-8.14.3-all.zip/gradle-8.11.1-bin.zip/' gradle/wrapper/gradle-wrapper.properties
          sed -i '' 's/Xmx1536m/Xmx2048m/' gradle.properties
          echo "=== Building :app:assembleDebug (no-daemon) ==="
          ./gradlew :app:assembleDebug --no-daemon
          GRADLE_EXIT=$?
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "Gradle FAILED with exit code $GRADLE_EXIT"
            exit $GRADLE_EXIT
          fi
          echo ""
          echo "=== Gradle finished. Searching for APK ==="
          find . -name "*.apk" -type f 2>/dev/null || true
          APK_SRC="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_SRC" ]; then
            APK_SRC=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$APK_SRC" ] || [ ! -f "$APK_SRC" ]; then
            echo "ERROR: No APK produced!"
            find app/build -type f 2>/dev/null | head -50
            exit 1
          fi
          echo "Found APK at: $APK_SRC"
          mkdir -p "$ROOT_DIR/apk_output"
          cp "$APK_SRC" "$ROOT_DIR/apk_output/app-debug.apk"
          ls -la "$ROOT_DIR/apk_output/app-debug.apk"

    artifacts:
      - apk_output/app-debug.apk

    publishing:
      email:
        recipients:
          - ahmedfreedom2019@gmail.com
        notify:
          success: true
          failure: true
