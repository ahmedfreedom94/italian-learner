workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 60
    environment:
      node: 22
      java: 21
      vars:
        COREPACK_ENABLE_STRICT: "0"
    scripts:
      - name: Setup pnpm
        script: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm --version

      - name: Install dependencies
        script: pnpm install --no-frozen-lockfile

      - name: Setup Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > artifacts/italiano/android/local.properties

      - name: Create webDir for Capacitor
        script: |
          mkdir -p artifacts/italiano/dist/public
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Loading...</title></head><body></body></html>' > artifacts/italiano/dist/public/index.html

      - name: Sync Capacitor
        script: |
          cd artifacts/italiano
          npx cap sync android

      - name: Fix AdMob missing libs directory
        script: |
          echo "Searching for admob android dirs..."
          find /Users/builder -path "*admob*/android" -type d 2>/dev/null | while read dir; do
            echo "Creating libs dir in: $dir"
            mkdir -p "$dir/libs"
          done
          find . -path "*admob*/android" -type d 2>/dev/null | while read dir; do
            echo "Creating libs dir in: $dir"
            mkdir -p "$dir/libs"
          done
          echo "Done."

      - name: Build Android APK
        script: |
          ROOT_DIR=$(pwd)
          cd artifacts/italiano/android
          chmod +x gradlew
          ./gradlew :app:assembleDebug
          echo ""
          echo "=== All build output files ==="
          find . -path "*/build/outputs/*" -type f 2>/dev/null || true
          echo ""
          echo "=== All APK files in android dir ==="
          find . -name "*.apk" -type f 2>/dev/null || true
          echo ""
          echo "=== All APK files under /Users/builder ==="
          find /Users/builder -name "*.apk" -type f 2>/dev/null || true
          echo ""
          APK_SRC=""
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            APK_SRC="app/build/outputs/apk/debug/app-debug.apk"
          else
            APK_SRC=$(find . -path "*/build/outputs/*" -name "*.apk" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$APK_SRC" ]; then
            APK_SRC=$(find /Users/builder -name "*.apk" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$APK_SRC" ]; then
            echo "ERROR: No APK found anywhere after BUILD SUCCESSFUL!"
            echo "=== Listing all files in app/build/outputs ==="
            find app/build/outputs -type f 2>/dev/null || echo "app/build/outputs does not exist"
            echo "=== Listing all files in app/build ==="
            ls -laR app/build/ 2>/dev/null | head -100 || echo "app/build does not exist"
            exit 1
          fi
          echo "Found APK at: $APK_SRC"
          mkdir -p "$ROOT_DIR/apk_output"
          cp "$APK_SRC" "$ROOT_DIR/apk_output/app-debug.apk"
          echo "APK copied successfully:"
          ls -la "$ROOT_DIR/apk_output/app-debug.apk"

    artifacts:
      - apk_output/app-debug.apk

    publishing:
      email:
        recipients:
          - ahmedfreedom2019@gmail.com
        notify:
          success: true
          failure: true
