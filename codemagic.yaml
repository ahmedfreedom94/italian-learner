workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 60
    environment:
      node: 20.0.0
      java: 17
      vars:
        COREPACK_ENABLE_STRICT: "0"
    scripts:
      - name: Enable pnpm via Corepack
        script: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate
          pnpm --version

      - name: Install dependencies
        script: pnpm install --no-frozen-lockfile

      - name: Build web app
        script: |
          cd artifacts/italiano
          NODE_ENV=production pnpm run build

      - name: Sync Capacitor
        script: |
          cd artifacts/italiano
          npx cap sync android

      - name: Build Android APK
        script: |
          cd artifacts/italiano/android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - artifacts/italiano/android/app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - your-email@gmail.com
        notify:
          success: true
          failure: true
