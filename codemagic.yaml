workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Setup Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > artifacts/italiano/android/local.properties
          cat artifacts/italiano/android/local.properties

      - name: Build Android APK
        script: |
          cd artifacts/italiano/android
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease || ./gradlew assembleDebug

      - name: List generated APKs
        script: |
          echo "=== All APK files ==="
          find artifacts/italiano/android -name "*.apk" -type f
          echo "=== Done ==="

    artifacts:
      - artifacts/italiano/android/app/build/outputs/**/*.apk
      - artifacts/italiano/android/app/build/**/*.apk

    publishing:
      email:
        recipients:
          - ahmedfreedom2019@gmail.com
        notify:
          success: true
          failure: true
