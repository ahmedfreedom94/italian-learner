workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 60
    environment:
      node: 22
      java: 21
      vars:
        COREPACK_ENABLE_STRICT: "0"
    scripts:
      - name: Setup pnpm
        script: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm --version

      - name: Install dependencies
        script: pnpm install --no-frozen-lockfile

      - name: Setup Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > artifacts/italiano/android/local.properties

      - name: Create webDir for Capacitor
        script: |
          mkdir -p artifacts/italiano/dist/public
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Loading...</title></head><body></body></html>' > artifacts/italiano/dist/public/index.html

      - name: Sync Capacitor
        script: |
          cd artifacts/italiano
          npx cap sync android

      - name: Fix AdMob missing libs directory
        script: |
          echo "Searching for admob android dirs..."
          find /Users/builder -path "*admob*/android" -type d 2>/dev/null | while read dir; do
            echo "Creating libs dir in: $dir"
            mkdir -p "$dir/libs"
          done
          find . -path "*admob*/android" -type d 2>/dev/null | while read dir; do
            echo "Creating libs dir in: $dir"
            mkdir -p "$dir/libs"
          done
          echo "Done."

      - name: Build Android APK
        script: |
          cd artifacts/italiano/android
          chmod +x gradlew
          ./gradlew assembleDebug
          echo ""
          echo "=== APK files produced ==="
          find . -name "*.apk" -type f
          echo ""
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "APK found at $APK_PATH"
            mkdir -p "$OLDPWD/apk_output"
            cp "$APK_PATH" "$OLDPWD/apk_output/app-debug.apk"
            ls -la "$OLDPWD/apk_output/app-debug.apk"
          else
            echo "ERROR: APK not found at expected path!"
            find /Users/builder -name "*.apk" -type f 2>/dev/null
            exit 1
          fi

    artifacts:
      - apk_output/app-debug.apk

    publishing:
      email:
        recipients:
          - ahmedfreedom2019@gmail.com
        notify:
          success: true
          failure: true
