workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Build Android APK
        script: |
          cd artifacts/italiano/android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - artifacts/italiano/android/app/build/outputs/apk/**/*.apk

    publishing:
      email:
        recipients:
          - your-email@gmail.com
        notify:
          success: true
          failure: true
