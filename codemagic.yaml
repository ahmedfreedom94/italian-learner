workflows:
  android-build:
    name: Build Android APK
    max_build_duration: 60
    environment:
      node: 22
      java: 21
      vars:
        COREPACK_ENABLE_STRICT: "0"
    scripts:
      - name: Setup pnpm
        script: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate
          pnpm --version

      - name: Install dependencies
        script: pnpm install --no-frozen-lockfile

      - name: Setup Android SDK path
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > artifacts/italiano/android/local.properties

      - name: Create webDir for Capacitor
        script: |
          mkdir -p artifacts/italiano/dist/public
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Loading...</title></head><body></body></html>' > artifacts/italiano/dist/public/index.html

      - name: Sync Capacitor
        script: |
          cd artifacts/italiano
          npx cap sync android

      - name: Build Android APK
        script: |
          cd artifacts/italiano/android
          chmod +x gradlew
          ./gradlew assembleDebug 2>&1 | tee /tmp/gradle_output.log
          GRADLE_EXIT=$?
          echo ""
          echo "=== Gradle exit code: $GRADLE_EXIT ==="
          echo ""
          echo "=== Build directory structure ==="
          find app/build/outputs -type f 2>/dev/null || echo "No app/build/outputs found"
          echo ""
          echo "=== All APK files in project ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APKs found in project"
          echo ""
          echo "=== All APK files on system ==="
          find /Users/builder -name "*.apk" -type f 2>/dev/null || echo "No APKs found on system"
          echo ""
          echo "=== PWD and CM_BUILD_DIR ==="
          echo "PWD: $(pwd)"
          echo "CM_BUILD_DIR: ${CM_BUILD_DIR:-not set}"
          echo ""
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "Gradle build failed!"
            exit $GRADLE_EXIT
          fi

      - name: Collect APK artifact
        script: |
          echo "=== Searching entire system for APK files ==="
          find / -name "*.apk" -type f 2>/dev/null
          echo ""
          APK_SRC=$(find / -name "app-debug.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_SRC" ]; then
            APK_SRC=$(find / -name "*.apk" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$APK_SRC" ]; then
            echo "ERROR: No APK found anywhere on the system!"
            exit 1
          fi
          echo "Found APK at: $APK_SRC"
          mkdir -p /tmp/artifacts
          cp "$APK_SRC" /tmp/artifacts/app-debug.apk
          echo "APK copied successfully:"
          ls -la /tmp/artifacts/app-debug.apk

    artifacts:
      - /tmp/artifacts/app-debug.apk

    publishing:
      email:
        recipients:
          - ahmedfreedom2019@gmail.com
        notify:
          success: true
          failure: true
