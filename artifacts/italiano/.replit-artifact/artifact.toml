kind = "web"
previewPath = "/"
title = "تعلم الإيطالية"
version = "1.0.0"
id = "artifacts/italiano"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22102
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/italiano run dev"

[services.env]
PORT = "22102"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/italiano", "run", "build"]
publicDir = "artifacts/italiano/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
